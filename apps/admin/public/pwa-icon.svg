<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Pixie Hub">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a0f15"/>
      <stop offset="1" stop-color="#0f0809"/>
    </linearGradient>
    <radialGradient id="petal" cx="50%" cy="35%" r="60%">
      <stop offset="0" stop-color="#e03030"/>
      <stop offset="0.55" stop-color="#a81d1d"/>
      <stop offset="1" stop-color="#690909"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <g transform="translate(256,256)">
    <ellipse rx="55" ry="130" transform="rotate(45)" fill="url(#petal)"/>
    <ellipse rx="55" ry="130" transform="rotate(-45)" fill="url(#petal)"/>
  </g>
</svg>
