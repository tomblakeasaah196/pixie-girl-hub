  # ── Documents & Signatures (Module 6.13) ────────────────────────
  /documents:
    get:
      summary: List documents
      tags: [documents]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - { name: document_type, in: query, schema: { type: string } }
        - { name: reference_type, in: query, schema: { type: string } }
        - {
            name: reference_id,
            in: query,
            schema: { type: string, format: uuid },
          }
        - { name: q, in: query, schema: { type: string } }
      x-required-permission: "documents.view"
      x-is-write: false
      responses: { "200": { description: A page of documents } }
    post:
      summary: Upload a document (multipart; routed through the storage gateway)
      tags: [documents]
      parameters: [{ $ref: "#/components/parameters/BrandContext" }]
      x-required-permission: "documents.create"
      x-is-write: true
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
                document_type: { type: string }
                title: { type: string }
                reference_type: { type: string }
                reference_id: { type: string, format: uuid }
      responses:
        "201": { description: Stored }
        "400": { $ref: "#/components/responses/ValidationError" }
  /documents/{id}:
    parameters:
      - $ref: "#/components/parameters/BrandContext"
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    get:
      summary: Get document metadata
      tags: [documents]
      x-required-permission: "documents.view"
      responses:
        {
          "200": { description: Document },
          "404": { $ref: "#/components/responses/NotFound" },
        }
    delete:
      summary: Delete a document
      tags: [documents]
      x-required-permission: "documents.delete"
      x-is-write: true
      responses: { "204": { description: Deleted } }
  /documents/{id}/download:
    get:
      summary: Download the stored file
      tags: [documents]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      x-required-permission: "documents.view"
      responses:
        {
          "200": { description: File stream },
          "404": { $ref: "#/components/responses/NotFound" },
        }
  /documents/signatures:
    get:
      summary: List e-signature requests
      tags: [documents, signatures]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - { name: status, in: query, schema: { type: string } }
        - { name: request_type, in: query, schema: { type: string } }
      x-required-permission: "documents.view"
      responses: { "200": { description: A page of signature requests } }
    post:
      summary: Create a signature request against a document (with signers)
      tags: [documents, signatures]
      parameters: [{ $ref: "#/components/parameters/BrandContext" }]
      x-required-permission: "documents.create"
      x-is-write: true
      responses:
        {
          "201": { description: Draft request created },
          "400": { $ref: "#/components/responses/ValidationError" },
        }
  /documents/signatures/{id}:
    get:
      summary: Get a signature request (signers + hash-chained audit events)
      tags: [documents, signatures]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      x-required-permission: "documents.view"
      responses:
        {
          "200": { description: Signature request detail },
          "404": { $ref: "#/components/responses/NotFound" },
        }
  /documents/signatures/{id}/send:
    post:
      summary: Send a draft request to its signers
      tags: [documents, signatures]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      x-required-permission: "documents.edit"
      x-is-write: true
      responses:
        {
          "200": { description: Sent },
          "409": { description: Not in draft state },
        }
  /documents/signatures/{id}/cancel:
    post:
      summary: Cancel a not-yet-complete request
      tags: [documents, signatures]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - {
