<h1>Delivery Letter</h1>
<div class="meta">{{brand}} · Waybill {{waybill}}</div>
<h2>Recipient</h2>
<table>
  <tr><td>Name</td><td class="right">{{recipient_name}}</td></tr>
  <tr><td>Phone</td><td class="right">{{recipient_phone}}</td></tr>
  <tr><td>Address</td><td class="right">{{address}}</td></tr>
  <tr><td>Courier</td><td class="right">{{courier}}</td></tr>
  <tr><td>Order</td><td class="right">{{order}}</td></tr>
  {{{cod_row}}}
</table>
{{{items}}}
<h2>Sign on receipt</h2>
<p class="muted">Received in good condition by: ____________________________  Date: ____________</p>
