        supplier_id: { type: string, format: uuid }
        title: { type: string }
        po_currency: { type: string }
        subtotal: { type: number }
        tax_amount: { type: number }
        total: { type: number }
        total_ngn: { type: number }
        fx_rate_used: { type: number }
        status: { type: string }
        total_qty_ordered: { type: integer }
        total_qty_received: { type: integer }
        expected_delivery: { type: string, format: date, nullable: true }
        lines:
          { type: array, items: { type: object, additionalProperties: true } }
        history:
          { type: array, items: { type: object, additionalProperties: true } }
    Rfq:
      type: object
      properties:
        rfq_id: { type: string, format: uuid }
        rfq_number: { type: string }
        title: { type: string }
        status: { type: string }
        response_deadline: { type: string, format: date, nullable: true }
        awarded_supplier_id: { type: string, format: uuid, nullable: true }
        lines:
          { type: array, items: { type: object, additionalProperties: true } }
        quotes:
          { type: array, items: { type: object, additionalProperties: true } }
    GoodsReceivedNote:
      type: object
      properties:
        grn_id: { type: string, format: uuid }
        grn_number: { type: string }
        po_id: { type: string, format: uuid }
        status: { type: string }
        total_qty_received: { type: integer, nullable: true }
        total_qty_rejected: { type: integer }
        posted_at: { type: string, format: date-time, nullable: true }
        lines:
          { type: array, items: { type: object, additionalProperties: true } }
    SupplierInvoice:
      type: object
      properties:
        supplier_invoice_id: { type: string, format: uuid }
        internal_reference: { type: string }
        invoice_number: { type: string }
        supplier_id: { type: string, format: uuid }
        po_id: { type: string, format: uuid, nullable: true }
