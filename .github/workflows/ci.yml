name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize deploys so two runs never race on the same VPS working tree and
# build output. Overlapping `next build`s corrupt apps/landing/.next and make
# the build fail with ENOENT on .next/server/pages-manifest.json. Queue runs
# rather than cancelling — never kill a production deploy mid-flight.
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
  PUPPETEER_SKIP_DOWNLOAD: "true"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline
        timeout-minutes: 10

      - name: Run tests
        run: npm test --if-present || true
        continue-on-error: true

  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        timeout-minutes: 30
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: "28m"
          script: |
            set -e

            export PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
            export PUPPETEER_SKIP_DOWNLOAD=true
            export NPM_CONFIG_FETCH_TIMEOUT=60000
            export NPM_CONFIG_FETCH_RETRIES=3
            export NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT=60000

            cd /var/www/pixie-girl-hub

            echo "--- Syncing the VPS working tree to origin/main"
            # The VPS is a deploy target, not a dev checkout — never preserve
            # local commits or edits. A plain `git pull` aborts when main has been
            # force-pushed or squash/rebase-merged ("divergent branches need a
            # strategy"), which fails the whole deploy under `set -e`. Fetch and
            # hard-reset so the tree matches origin/main exactly, every time,
            # regardless of the VPS's prior state.
            git fetch origin main
            git reset --hard origin/main

            # ── Headless Chrome for PDF rendering ──────────────────
            # PDFs (invoices, receipts, payslips, reports) render via Puppeteer,
            # which needs a real Chrome/Chromium binary. This VPS deploy installs
            # backend deps with PUPPETEER_SKIP_DOWNLOAD=true (see env above), so
            # Puppeteer does NOT bring its own browser — and the Dockerfile that
            # installs chromium is not used on this host. Without this step the
            # VPS has no Chrome at all and every render fails with "Could not
            # launch Chromium" (API → PDF_UNAVAILABLE, UI → "PDF failed").
            # Install Google Chrome stable once; it lands at
            # /usr/bin/google-chrome-stable (which pdf.service auto-detects) and
            # the .deb pulls in every shared library Chrome needs. Best-effort:
            # a sudo/network hiccup must not fail the whole site deploy.
            echo "--- Ensuring headless Chrome is installed (PDF rendering)"
            if command -v google-chrome-stable >/dev/null 2>&1 \
               || command -v chromium >/dev/null 2>&1 \
               || command -v chromium-browser >/dev/null 2>&1; then
              echo "Chrome/Chromium already present ✓"
            else
              echo "No Chrome found — installing google-chrome-stable"
              CHROME_DEB="$(mktemp --suffix=.deb)"
              if curl -fsSL -o "$CHROME_DEB" \
                   https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb \
                 && sudo apt-get update -y \
                 && sudo apt-get install -y "$CHROME_DEB"; then
                echo "Installed $(google-chrome-stable --version 2>/dev/null) ✓"
              else
                echo "WARNING: could not install Chrome automatically — PDF"
                echo "rendering stays disabled until a Chrome/Chromium binary is"
                echo "installed on this host. Continuing with the rest of deploy."
              fi
              rm -f "$CHROME_DEB"
            fi

            # ── Backend ────────────────────────────────────────────
            echo "--- Installing backend dependencies"
            npm install --omit=dev

            echo "--- Building the ERP frontend (apps/admin/dist)"
            cd apps/admin
            npm install
            npm run build
            cd ../..

            echo "--- Running migrations"
            NODE_ENV=production node scripts/migrate-shared.js run
            NODE_ENV=production node scripts/repair-business-schema.js --all run

            echo "--- Zero-downtime reload backend"
            pm2 reload pixie-girl-hub || pm2 start ecosystem.config.js --only pixie-girl-hub --env production

            echo "--- Health check backend"
            PORT=$(grep -E '^PORT=' /var/www/pixie-girl-hub/.env | head -1 \
                   | cut -d '=' -f2 | tr -d ' "')
            PORT=${PORT:-7000}
            echo "Health-checking http://localhost:$PORT/health"

            HEALTHY=0
            for i in $(seq 1 10); do
              if curl -sf "http://localhost:$PORT/health" > /dev/null; then
                echo "Backend health check passed on attempt $i ✓"
                HEALTHY=1
                break
              fi
              echo "  attempt $i/10 — not ready, waiting 3s..."
              sleep 3
            done

            if [ "$HEALTHY" -ne 1 ]; then
              echo "Backend health check FAILED"
              pm2 list || true
              pm2 logs pixie-girl-hub --lines 40 --nostream || true
              exit 1
            fi

            echo "--- Verifying the served ERP build matches this commit"
            EXPECTED_BUILD=$(git rev-parse --short HEAD)
            SERVED_HTML=$(curl -s "http://localhost:$PORT/")
            if echo "$SERVED_HTML" | grep -q "x-build\" content=\"$EXPECTED_BUILD\""; then
              echo "Served ERP build matches HEAD ($EXPECTED_BUILD) ✓"
            else
              echo "ERP build verification FAILED"
              echo "  expected build id: $EXPECTED_BUILD"
              echo "  served meta tag:   $(echo "$SERVED_HTML" | grep -o 'x-build" content="[^"]*"' | head -1)"
              echo "  → the origin is serving a stale shell; deploy did not take effect."
              exit 1
            fi

            # ── Landing (Next.js) ──────────────────────────────────
            echo "--- Installing landing dependencies"
            cd apps/landing
            npm install

            echo "--- Building landing app (.next)"
            # Always build from a clean output dir. `git checkout`/`git pull`
            # don't touch .next (it's gitignored), so a stale or half-written
            # .next left by a previous interrupted/overlapping build makes
            # `next build` fail with ENOENT on .next/server/pages-manifest.json.
            rm -rf .next
            npm run build

            cd ../..

            echo "--- Zero-downtime reload landing"
            pm2 reload pixie-girl-landing || pm2 start ecosystem.config.js --only pixie-girl-landing --env production

            echo "--- Saving PM2 process list"
            pm2 save

            echo "--- Health check landing"
            HEALTHY=0
            for i in $(seq 1 10); do
              if curl -sf "http://localhost:3000" > /dev/null; then
                echo "Landing health check passed on attempt $i ✓"
                HEALTHY=1
                break
              fi
              echo "  attempt $i/10 — not ready, waiting 3s..."
              sleep 3
            done

            if [ "$HEALTHY" -ne 1 ]; then
              echo "Landing health check FAILED"
              pm2 list || true
              pm2 logs pixie-girl-landing --lines 40 --nostream || true
              exit 1
            fi

            echo "Production deploy complete ✓"
