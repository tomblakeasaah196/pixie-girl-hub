        }
    get:
      summary: Get landing-page config
      tags: [sales_campaigns]
      x-required-permission: "sales_campaigns.view"
      responses: { "200": { description: Landing config } }
    patch:
      summary: Update landing-page config
      tags: [sales_campaigns]
      x-required-permission: "sales_campaigns.edit"
      x-is-write: true
      responses: { "200": { description: Updated } }

  /sales-campaigns/{id}/preview:
    get:
      summary: Render landing payload for a given state (admin preview)
      tags: [sales_campaigns]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
        - {
            name: state,
            in: query,
            schema: { type: string, enum: [before, live, ended] },
          }
      x-required-permission: "sales_campaigns.view"
