openapi: 3.1.0
info:
  title: Pixie Girl Hub API
  version: 1.0.0
  description: |
    Backend API for the Pixie Girl Hub — multi-entity ERP/CRM/E-commerce platform.
    See ARCHITECTURE.md and API_CONVENTIONS.md in the same folder.

  contact:
    name: JBS Praxis
servers:
  - url: https://api.pixiegirlhub.com/api/v1
    description: Production
  - url: http://localhost:7000/api/v1
    description: Local dev

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    BrandContext:
      name: X-Brand-Context
      in: header
      required: true
      description: >
        The active business key. Brands are dynamic — loaded from
        shared.business_config via the brand registry (src/config/brands.js),
        not a fixed list — so a business provisioned in-app is accepted without
        a spec change. Validated against the live registry + BRAND_KEY_RE;
        pixiegirl and faitlynhair are the founding brands.
      schema:
        type: string
        pattern: "^[a-z][a-z0-9_]{1,62}$"
        examples:
          [
            Valid Brands (pixiegirl,
            faitlynhair),
            Invalid Brands (PixieGirl,
            pixie-girl,
            pixieGirl123,
            unknownbrand),
          ]
  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated but not permitted
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: Input validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationError"
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
        request_id:
          type: string
    ValidationError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum: [VALIDATION_ERROR]
            message:
              type: string
            fields:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
        request_id:
          type: string
    CampaignCreate:
      type: object
      required: [name, slug, starts_at, ends_at, discount_type, discount_value]
      properties:
        name: { type: string }
        slug: { type: string, pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$" }
        description: { type: string }
        starts_at: { type: string, format: date-time }
        ends_at: { type: string, format: date-time }
        discount_type:
          type: string
          enum: [percentage, fixed_amount, buy_x_get_y, bundle, free_shipping]
        discount_value:
          type: number
          description: "Fraction for percentage (0.20 = 20%); NGN amount otherwise."
        min_order_value_ngn: { type: number }
        customer_segment_id: { type: string, format: uuid }
        first_time_buyers_only: { type: boolean }
        product_scope:
          type: string
          enum: [all, specific_products, specific_categories]
        landing_hero_title: { type: string }
        landing_hero_subtitle: { type: string }
        landing_hero_image_url: { type: string, format: uri }
        landing_cta_text: { type: string }
        landing_blocks: { type: array, items: { type: object } }
        total_usage_limit: { type: integer }
    CampaignSignup:
      type: object
      properties:
        email: { type: string, format: email }
        phone: { type: string }
        notify_via: { type: string, enum: [email, whatsapp, sms, both] }
        source: { type: string }
      description: "email or phone is required"

    # ── Shared envelopes ────────────────────────────────────────
    # Every read returns { data: ... }; list reads return { data: [...], meta }.
    ListMeta:
      type: object
      properties:
        page: { type: integer }
        page_size: { type: integer }
        total: { type: integer }
        has_more: { type: boolean }

    # ── Logistics & Delivery (Module 6.10) — request schemas (mirror Zod) ──
    CourierCreate:
      type: object
      required: [courier_key, display_name]
      properties:
        courier_key: { type: string, maxLength: 40 }
        display_name: { type: string, maxLength: 120 }
        description: { type: string }
        integration_type:
          { type: string, enum: [manual, api, webhook_only, partner_portal] }
        api_endpoint: { type: string }
        webhook_secret: { type: string }
        serves_local: { type: boolean }
        serves_nationwide: { type: boolean }
        serves_international: { type: boolean }
        service_countries:
          { type: array, items: { type: string, maxLength: 3 } }
        rate_card: { type: object, additionalProperties: true }
        supports_pod: { type: boolean }
        pod_fee_pct: { type: number, minimum: 0, maximum: 100 }
        default_packaging: { type: string }
        display_order: { type: integer }
    CourierUpdate:
      description: "All CourierCreate fields except courier_key (all optional) + is_active."
      type: object
      properties:
        display_name: { type: string }
        description: { type: string }
        integration_type:
          { type: string, enum: [manual, api, webhook_only, partner_portal] }
        api_endpoint: { type: string }
        webhook_secret: { type: string }
        serves_local: { type: boolean }
        serves_nationwide: { type: boolean }
        serves_international: { type: boolean }
        service_countries: { type: array, items: { type: string } }
        rate_card: { type: object, additionalProperties: true }
        supports_pod: { type: boolean }
        pod_fee_pct: { type: number }
        default_packaging: { type: string }
        display_order: { type: integer }
        is_active: { type: boolean }
    DeliveryItem:
      type: object
      required: [description, quantity]
      properties:
        source_type: { type: string }
        source_id: { type: string, format: uuid }
        variant_id: { type: string, format: uuid }
        description: { type: string }
        quantity: { type: integer, minimum: 1 }
        weight_g: { type: integer }
        stock_movement_id: { type: string, format: uuid }
        notes: { type: string }
    DeliveryCreate:
      type: object
      required: [courier_id, delivery_address_snapshot]
      properties:
        order_id: { type: string, format: uuid }
        delivery_type:
          type: string
          enum:
            [
              sales_order,
              intercompany_transfer,
              stock_transfer,
              supplier_return,
              partner_consignment,
              sample,
              other,
            ]
        reference_type: { type: string }
        reference_id: { type: string, format: uuid }
        courier_id: { type: string, format: uuid }
        courier_tracking_ref: { type: string }
        courier_tracking_url: { type: string }
        from_location_id: { type: string, format: uuid }
        recipient_contact_id: { type: string, format: uuid }
        recipient_name_snapshot: { type: string }
        recipient_phone_snapshot: { type: string }
        recipient_whatsapp_snapshot: { type: string }
        delivery_address_snapshot: { type: object, additionalProperties: true }
        delivery_instructions: { type: string }
        courier_fee_ngn: { type: number, minimum: 0 }
        is_pay_on_delivery: { type: boolean }
        pod_amount_expected_ngn: { type: number, minimum: 0 }
        weight_g: { type: integer }
        package_count: { type: integer, minimum: 1 }
        declared_value_ngn: { type: number, minimum: 0 }
        items:
          { type: array, items: { $ref: "#/components/schemas/DeliveryItem" } }
    DeliveryBook:
      type: object
      properties:
        courier_tracking_ref: { type: string }
        courier_tracking_url: { type: string }
        expected_delivery_at: { type: string, format: date-time }
    DeliveryAdvance:
      type: object
      required: [to_status]
      properties:
        to_status:
          type: string
          enum:
            [
              picked_up,
              in_transit,
              arrived_destination_city,
              out_for_delivery,
              delivered,
              returned_to_sender,
              lost,
              damaged,
            ]
        notes: { type: string }
        source:
          {
            type: string,
            enum: [user, system, webhook, customer, courier_portal],
          }
    DeliveryCancel:
      type: object
      properties:
        reason: { type: string }
    DeliveryAttempt:
      type: object
      required: [outcome]
      properties:
        attempted_at: { type: string, format: date-time }
        outcome:
          type: string
          enum:
            [
              delivered,
              recipient_unavailable,
              address_wrong,
              recipient_refused,
              locked_premises,
              rescheduled,
              lost_in_transit,
              damaged,
              other_failure,
            ]
        outcome_notes: { type: string }
        rider_name: { type: string }
        rider_phone: { type: string }
        reported_lat: { type: number, minimum: -90, maximum: 90 }
        reported_lng: { type: number, minimum: -180, maximum: 180 }
        webhook_event_id: { type: string, format: uuid }
    DeliveryProof:
      type: object
      required: [proof_type]
      properties:
        proof_type:
          {
            type: string,
            enum:
              [
                photo_at_door,
                signature,
                recipient_id_photo,
                sms_otp_confirmed,
                call_confirmed,
              ],
          }
        document_id: { type: string, format: uuid }
        delivery_attempt_id: { type: string, format: uuid }
        recipient_name: { type: string }
        recipient_id_type: { type: string }
        recipient_id_last4: { type: string }
        otp_code_used: { type: string }
        notes: { type: string }
    CourierWebhookIngest:
      type: object
      required: [courier_id, external_event_type, payload, signature_valid]
      properties:
        courier_id: { type: string, format: uuid }
        delivery_id: { type: string, format: uuid }
        external_event_type: { type: string }
        external_event_id: { type: string }
        mapped_to_status: { type: string }
        payload: { type: object, additionalProperties: true }
        signature_valid: { type: boolean }
        shared_webhook_id: { type: string, format: uuid }
    PodCreate:
      type: object
      required: [delivery_id]
      properties:
        delivery_id: { type: string, format: uuid }
        expected_amount_ngn: { type: number, minimum: 0 }
        courier_fee_ngn: { type: number, minimum: 0 }
        notes: { type: string }
    PodCollected:
      type: object
      required: [collected_amount_ngn]
      properties:
        collected_amount_ngn: { type: number, minimum: 0 }
    PodRemit:
      type: object
      properties:
        collected_amount_ngn: { type: number, minimum: 0 }
        remitted_reference: { type: string }
    PodReconcile:
      type: object
      properties:
        status:
          {
            type: string,
            enum: [reconciled, disputed, short_paid, written_off],
          }
        notes: { type: string }
    Courier:
      type: object
      properties:
        courier_id: { type: string, format: uuid }
        courier_key: { type: string }
        display_name: { type: string }
        integration_type: { type: string }
        serves_local: { type: boolean }
        serves_nationwide: { type: boolean }
        serves_international: { type: boolean }
        service_countries: { type: array, items: { type: string } }
        rate_card: { type: object, additionalProperties: true }
        supports_pod: { type: boolean }
        pod_fee_pct: { type: number, nullable: true }
        is_active: { type: boolean }
        display_order: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Delivery:
      type: object
      properties:
        delivery_id: { type: string, format: uuid }
        delivery_number: { type: string }
        order_id: { type: string, format: uuid, nullable: true }
        delivery_type: { type: string }
        courier_id: { type: string, format: uuid }
        courier_tracking_ref: { type: string, nullable: true }
        courier_tracking_url: { type: string, nullable: true }
        recipient_name_snapshot: { type: string, nullable: true }
        delivery_address_snapshot: { type: object, additionalProperties: true }
        courier_fee_ngn: { type: number }
        is_pay_on_delivery: { type: boolean }
        pod_amount_expected_ngn: { type: number, nullable: true }
        status:
          type: string
          enum:
            [
              queued,
              booked,
              picked_up,
              in_transit,
              arrived_destination_city,
              out_for_delivery,
              attempted_failed,
              delivered,
              returned_to_sender,
              lost,
              damaged,
              cancelled,
            ]
        attempt_count: { type: integer }
        public_tracking_token: { type: string, nullable: true }
        booked_at: { type: string, format: date-time, nullable: true }
        delivered_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    DeliveryDetail:
      allOf:
        - $ref: "#/components/schemas/Delivery"
        - type: object
          properties:
            items:
              {
                type: array,
                items: { type: object, additionalProperties: true },
              }
            attempts:
              {
                type: array,
                items: { type: object, additionalProperties: true },
              }
            history:
              {
                type: array,
                items: { type: object, additionalProperties: true },
              }
            proofs:
              {
                type: array,
                items: { type: object, additionalProperties: true },
              }
    PodCollection:
      type: object
      properties:
        collection_id: { type: string, format: uuid }
        collection_number: { type: string }
        delivery_id: { type: string, format: uuid }
        courier_id: { type: string, format: uuid }
        expected_amount_ngn: { type: number }
        collected_amount_ngn: { type: number, nullable: true }
        courier_fee_ngn: { type: number }
        net_to_us_ngn: { type: number }
        variance_ngn: { type: number }
        status:
          type: string
          enum:
            [
              pending,
              collected_by_courier,
              remitted,
              reconciled,
              disputed,
              short_paid,
              written_off,
            ]
        remitted_reference: { type: string, nullable: true }
        sales_order_payment_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
    DeliveryTracking:
      type: object
      properties:
        delivery_number: { type: string }
        status: { type: string }
        courier_tracking_ref: { type: string, nullable: true }
        courier_tracking_url: { type: string, nullable: true }
        expected_delivery_at:
          { type: string, format: date-time, nullable: true }
        delivered_at: { type: string, format: date-time, nullable: true }
        recipient_name_snapshot: { type: string, nullable: true }
        history:
          type: array
          items:
            type: object
            properties:
              to_status: { type: string }
              changed_at: { type: string, format: date-time }
              notes: { type: string, nullable: true }

    # ── Purchasing & Procurement (Module 6.8) ───────────────────
    SupplierProductInput:
      type: object
      required: [variant_id]
      properties:
        variant_id: { type: string, format: uuid }
        supplier_sku: { type: string }
        supplier_description: { type: string }
        last_unit_cost: { type: number }
        last_unit_cost_currency: { type: string }
        last_unit_cost_ngn: { type: number }
        lead_time_days: { type: integer }
        minimum_order_qty: { type: integer }
        preferred: { type: boolean }
        is_active: { type: boolean }
        notes: { type: string }
    SupplierCreate:
      type: object
      required: [contact_id, display_name]
      properties:
        contact_id: { type: string, format: uuid }
        display_name: { type: string, maxLength: 200 }
        supplier_type:
          {
            type: string,
            enum: [goods, services, factory, 3pl, customs_broker, utility],
          }
        country_of_origin: { type: string }
        city: { type: string }
        default_currency: { type: string }
        tax_treatment:
          {
            type: string,
            enum: [standard, zero_rated, exempt, foreign, reverse_charge],
          }
        vat_applicable: { type: boolean }
        wht_applicable: { type: boolean }
        wht_rate: { type: number, minimum: 0, maximum: 1 }
        payment_terms_days: { type: integer }
        credit_limit_ngn: { type: number }
        bank_name: { type: string }
        bank_account_number: { type: string }
        bank_swift: { type: string }
        bank_routing: { type: string }
        bank_address: { type: string }
        preferred: { type: boolean }
        notes: { type: string }
        products:
          {
            type: array,
            items: { $ref: "#/components/schemas/SupplierProductInput" },
          }
    SupplierUpdate:
      description: "SupplierCreate fields (except contact_id/products), all optional, + on_hold/hold_reason/is_active/performance_rating."
      type: object
      properties:
        display_name: { type: string }
        supplier_type:
          {
            type: string,
            enum: [goods, services, factory, 3pl, customs_broker, utility],
          }
        country_of_origin: { type: string }
        city: { type: string }
        default_currency: { type: string }
        tax_treatment:
          {
            type: string,
            enum: [standard, zero_rated, exempt, foreign, reverse_charge],
          }
        vat_applicable: { type: boolean }
        wht_applicable: { type: boolean }
        wht_rate: { type: number }
        payment_terms_days: { type: integer }
        credit_limit_ngn: { type: number }
        bank_name: { type: string }
        bank_account_number: { type: string }
        bank_swift: { type: string }
        bank_routing: { type: string }
        bank_address: { type: string }
        preferred: { type: boolean }
        on_hold: { type: boolean }
        hold_reason: { type: string }
        performance_rating: { type: number }
        notes: { type: string }
        is_active: { type: boolean }
    SupplierContactAdd:
      type: object
      required: [contact_id]
      properties:
        contact_id: { type: string, format: uuid }
        role: { type: string }
        is_primary: { type: boolean }
        notes: { type: string }
    SupplierProductUpdate:
      description: "SupplierProductInput fields except variant_id (all optional)."
      type: object
      properties:
        supplier_sku: { type: string }
        supplier_description: { type: string }
        last_unit_cost: { type: number }
        last_unit_cost_currency: { type: string }
        last_unit_cost_ngn: { type: number }
        lead_time_days: { type: integer }
        minimum_order_qty: { type: integer }
        preferred: { type: boolean }
        is_active: { type: boolean }
        notes: { type: string }
    RfqLineInput:
      type: object
      required: [description, quantity]
      properties:
        variant_id: { type: string, format: uuid }
        description: { type: string }
        quantity: { type: integer, minimum: 1 }
        unit_of_measure: { type: string }
        target_unit_price_ngn: { type: number }
        notes: { type: string }
    RfqCreate:
      type: object
      required: [title, lines]
      properties:
        title: { type: string }
        description: { type: string }
        response_deadline: { type: string, format: date }
        lines:
          {
            type: array,
            minItems: 1,
            items: { $ref: "#/components/schemas/RfqLineInput" },
          }
    QuoteCreate:
      type: object
      required: [supplier_id, quote_currency, total_quoted, total_quoted_ngn]
      properties:
        supplier_id: { type: string, format: uuid }
        quote_currency: { type: string }
        total_quoted: { type: number }
        total_quoted_ngn: { type: number }
        fx_rate_used: { type: number }
        line_prices:
          { type: array, items: { type: object, additionalProperties: true } }
        payment_terms_days: { type: integer }
        lead_time_days: { type: integer }
        validity_until: { type: string, format: date }
        shipping_terms: { type: string }
        quote_document_id: { type: string, format: uuid }
        notes: { type: string }
    RfqAward:
      type: object
      required: [quote_id]
      properties:
        quote_id: { type: string, format: uuid }
    PoLineInput:
      type: object
      required: [description, qty_ordered, unit_price]
      properties:
        variant_id: { type: string, format: uuid }
        description: { type: string }
        supplier_sku: { type: string }
        qty_ordered: { type: integer, minimum: 1 }
        unit_price: { type: number }
        tax_rate: { type: number, minimum: 0, maximum: 1 }
        notes: { type: string }
    PoCreate:
      type: object
      required: [supplier_id, title, po_currency, lines]
      properties:
        supplier_id: { type: string, format: uuid }
        rfq_id: { type: string, format: uuid }
        awarded_quote_id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        delivery_location_id: { type: string, format: uuid }
        po_currency: { type: string }
        fx_rate: { type: number }
        shipping: { type: number }
        payment_terms_days: { type: integer }
        expected_delivery: { type: string, format: date }
        shipping_terms: { type: string }
        lines:
          {
            type: array,
            minItems: 1,
            items: { $ref: "#/components/schemas/PoLineInput" },
          }
    PoAdvance:
      type: object
      required: [to_status]
      properties:
        to_status:
          {
            type: string,
            enum:
              [
                in_production,
                quality_check,
                ready_to_ship,
                in_transit,
                arrived_lagos,
                cleared_customs,
                partially_received,
                received,
                closed,
              ],
          }
        notes: { type: string }
        source: { type: string, enum: [user, system, webhook] }
    PoCancel:
      type: object
      properties: { reason: { type: string } }
    GrnLineInput:
      type: object
      required: [po_line_id, qty_expected, qty_received]
      properties:
        po_line_id: { type: string, format: uuid }
        variant_id: { type: string, format: uuid }
        qty_expected: { type: integer, minimum: 0 }
        qty_received: { type: integer, minimum: 0 }
        qty_rejected: { type: integer, minimum: 0 }
        inspection_result:
          { type: string, enum: [pass, partial_pass, fail, pending] }
        rejection_reason: { type: string }
        unit_cost_ngn: { type: number }
    GrnCreate:
      type: object
      required: [po_id, received_at_location_id, lines]
      properties:
        po_id: { type: string, format: uuid }
        received_at_location_id: { type: string, format: uuid }
        inbound_shipment_id: { type: string, format: uuid }
        delivery_note_ref: { type: string }
        inspected_by: { type: string, format: uuid }
        rejection_reason: { type: string }
        notes: { type: string }
        lines:
          {
            type: array,
            minItems: 1,
            items: { $ref: "#/components/schemas/GrnLineInput" },
          }
    SupplierInvoiceLineInput:
      type: object
      required: [description, quantity, unit_price]
      properties:
        po_line_id: { type: string, format: uuid }
        description: { type: string }
        quantity: { type: number }
        unit_price: { type: number }
        tax_rate: { type: number, minimum: 0, maximum: 1 }
    SupplierInvoiceCreate:
      type: object
      required:
        [
          invoice_number,
          supplier_id,
          invoice_currency,
          invoice_date,
          due_date,
          lines,
        ]
      properties:
        invoice_number: { type: string }
        supplier_id: { type: string, format: uuid }
        po_id: { type: string, format: uuid }
        invoice_currency: { type: string }
        fx_rate: { type: number }
        invoice_date: { type: string, format: date }
        due_date: { type: string, format: date }
        shipping: { type: number }
        wht_amount: { type: number }
        invoice_document_id: { type: string, format: uuid }
        notes: { type: string }
        lines:
          {
            type: array,
            minItems: 1,
            items: { $ref: "#/components/schemas/SupplierInvoiceLineInput" },
          }
    SupplierInvoiceApprove:
      type: object
      properties: { override_reason: { type: string } }
    SupplierInvoicePay:
      type: object
      required: [amount_ngn]
      properties:
        amount_ngn: { type: number }
        payment_account_code: { type: string }
    SupplierInvoiceVoid:
      type: object
      properties: { reason: { type: string } }
    Supplier:
      type: object
      properties:
        supplier_id: { type: string, format: uuid }
        supplier_code: { type: string }
        contact_id: { type: string, format: uuid }
        display_name: { type: string }
        supplier_type: { type: string }
        default_currency: { type: string, nullable: true }
        payment_terms_days: { type: integer }
        preferred: { type: boolean }
        on_hold: { type: boolean }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
    SupplierDetail:
      allOf:
        - $ref: "#/components/schemas/Supplier"
        - type: object
          properties:
            contacts:
              {
                type: array,
                items: { type: object, additionalProperties: true },
              }
            products:
              {
                type: array,
                items: { type: object, additionalProperties: true },
              }
    PurchaseOrder:
      type: object
      properties:
        po_id: { type: string, format: uuid }
        po_number: { type: string }
        supplier_id: { type: string, format: uuid }
        title: { type: string }
        po_currency: { type: string }
        subtotal: { type: number }
        tax_amount: { type: number }
        total: { type: number }
        total_ngn: { type: number }
        fx_rate_used: { type: number }
        status: { type: string }
        total_qty_ordered: { type: integer }
        total_qty_received: { type: integer }
        expected_delivery: { type: string, format: date, nullable: true }
        lines:
          { type: array, items: { type: object, additionalProperties: true } }
        history:
          { type: array, items: { type: object, additionalProperties: true } }
    Rfq:
      type: object
      properties:
        rfq_id: { type: string, format: uuid }
        rfq_number: { type: string }
        title: { type: string }
        status: { type: string }
        response_deadline: { type: string, format: date, nullable: true }
        awarded_supplier_id: { type: string, format: uuid, nullable: true }
        lines:
          { type: array, items: { type: object, additionalProperties: true } }
        quotes:
          { type: array, items: { type: object, additionalProperties: true } }
    GoodsReceivedNote:
      type: object
      properties:
        grn_id: { type: string, format: uuid }
        grn_number: { type: string }
        po_id: { type: string, format: uuid }
        status: { type: string }
        total_qty_received: { type: integer, nullable: true }
        total_qty_rejected: { type: integer }
        posted_at: { type: string, format: date-time, nullable: true }
        lines:
          { type: array, items: { type: object, additionalProperties: true } }
    SupplierInvoice:
      type: object
      properties:
        supplier_invoice_id: { type: string, format: uuid }
        internal_reference: { type: string }
        invoice_number: { type: string }
        supplier_id: { type: string, format: uuid }
        po_id: { type: string, format: uuid, nullable: true }
        total_ngn: { type: number }
        amount_paid_ngn: { type: number }
        balance_due_ngn: { type: number }
        status: { type: string }
        match_status: { type: string }
        journal_entry_id: { type: string, format: uuid, nullable: true }
        lines:
          { type: array, items: { type: object, additionalProperties: true } }
        matches:
          { type: array, items: { type: object, additionalProperties: true } }
    AiGovernanceCreate:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        enabled: { type: boolean }
        vendor: { type: string }
        config: { type: object, additionalProperties: true }
    AiGovernanceUpdate:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        enabled: { type: boolean }
        config: { type: object, additionalProperties: true }
    AiGovernanceItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        enabled: { type: boolean }
        vendor: { type: string }
        config: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

paths:
  /auth/login:
    post:
      summary: Login with email + password
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Logged in
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── AI Governance (Module 6.31) ───────────────────────────────
  /ai-governance:
    get:
      summary: List AI governance entries
      tags: [ai_governance]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - {
            name: page_size,
            in: query,
            schema: { type: integer, default: 25, maximum: 100 },
          }
        - { name: q, in: query, schema: { type: string } }
      x-required-permission: "ai_governance.view"
      x-is-write: false
      x-entity-scope: brand
      responses:
        "200":
          description: A page of AI governance entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AiGovernanceItem"
                  meta:
                    $ref: "#/components/schemas/ListMeta"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Create a new AI governance entry
      tags: [ai_governance]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
      x-required-permission: "ai_governance.create"
      x-is-write: true
      x-entity-scope: brand
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AiGovernanceCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/AiGovernanceItem" }
        "400": { $ref: "#/components/responses/ValidationError" }

  /ai-governance/{id}:
    parameters:
      - $ref: "#/components/parameters/BrandContext"
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Get AI governance entry by ID
      tags: [ai_governance]
      x-required-permission: "ai_governance.view"
      x-is-write: false
      x-entity-scope: brand
      responses:
        "200":
          description: AI governance item
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/AiGovernanceItem" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      summary: Update an AI governance entry
      tags: [ai_governance]
      x-required-permission: "ai_governance.edit"
      x-is-write: true
      x-entity-scope: brand
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AiGovernanceUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/AiGovernanceItem" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Archive an AI governance entry
      tags: [ai_governance]
      x-required-permission: "ai_governance.delete"
      x-is-write: true
      x-entity-scope: brand
      responses:
        "204": { description: Archived }

  # ── Sales Campaigns (Module 6.22) ───────────────────────────────
  /sales-campaigns:
    get:
      summary: List campaigns
      tags: [sales_campaigns]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - {
            name: status,
            in: query,
            schema: { type: string },
            description: "comma-separated status filter",
          }
        - { name: q, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - {
            name: page_size,
            in: query,
            schema: { type: integer, default: 25, maximum: 100 },
          }
      x-required-permission: "sales_campaigns.view"
      x-entity-scope: brand
      x-is-write: false
      x-ai-enabled: false
      responses:
        "200": { description: A page of campaigns }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Create a campaign (draft)
      tags: [sales_campaigns]
      parameters: [{ $ref: "#/components/parameters/BrandContext" }]
      x-required-permission: "sales_campaigns.create"
      x-entity-scope: brand
      x-is-write: true
      x-ai-enabled: false
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CampaignCreate" }
      responses:
        "201": { description: Created }
        "400": { $ref: "#/components/responses/ValidationError" }
        "409": { description: Slug already in use }

  /sales-campaigns/{id}:
    parameters:
      - $ref: "#/components/parameters/BrandContext"
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    get:
      summary: Get a campaign (with products + rollups)
      tags: [sales_campaigns]
      x-required-permission: "sales_campaigns.view"
      x-entity-scope: brand
      x-is-write: false
      responses:
        "200": { description: Campaign detail }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      summary: Update a campaign (draft/scheduled/paused only)
      tags: [sales_campaigns]
      x-required-permission: "sales_campaigns.edit"
      x-entity-scope: brand
      x-is-write: true
      responses:
        "200": { description: Updated }
        "409": { description: Invalid state for edit }
    delete:
      summary: Archive a campaign
      tags: [sales_campaigns]
      x-required-permission: "sales_campaigns.delete"
      x-entity-scope: brand
      x-is-write: true
      responses:
        "204": { description: Archived }

  /sales-campaigns/{id}/submit:
    post:
      summary: Submit a draft campaign for approval (opens workflow)
      tags: [sales_campaigns]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      x-required-permission: "sales_campaigns.edit"
      x-entity-scope: brand
      x-is-write: true
      responses:
        "200": { description: Now pending_approval }
        "409": { description: Not in draft state }

  /sales-campaigns/{id}/approve:
    post:
      summary: Approve a pending campaign (CEO/manager)
      tags: [sales_campaigns]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      x-required-permission: "sales_campaigns.approve"
      x-entity-scope: brand
      x-is-write: true
      responses:
        "200": { description: Approved → scheduled }

  /sales-campaigns/{id}/reject:
    post:
      summary: Reject a pending campaign (back to draft)
      tags: [sales_campaigns]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      x-required-permission: "sales_campaigns.approve"
      x-entity-scope: brand
      x-is-write: true
      responses:
        "200": { description: Rejected → draft }

  /sales-campaigns/{id}/launch:
    post:
      summary: Manually launch an approved campaign (→ live)
      tags: [sales_campaigns]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      x-required-permission: "sales_campaigns.edit"
      x-entity-scope: brand
      x-is-write: true
      responses:
        "200": { description: Live }
        "409": { description: Not approved / wrong state }

  /sales-campaigns/{id}/pause:
    post:
      {
        summary: Pause a live campaign,
        tags: [sales_campaigns],
        parameters:
          [
            { $ref: "#/components/parameters/BrandContext" },
            {
              name: id,
              in: path,
              required: true,
              schema: { type: string, format: uuid },
            },
          ],
        x-required-permission: "sales_campaigns.edit",
        x-is-write: true,
        responses: { "200": { description: Paused } },
      }
  /sales-campaigns/{id}/resume:
    post:
      {
        summary: Resume a paused campaign,
        tags: [sales_campaigns],
        parameters:
          [
            { $ref: "#/components/parameters/BrandContext" },
            {
              name: id,
              in: path,
              required: true,
              schema: { type: string, format: uuid },
            },
          ],
        x-required-permission: "sales_campaigns.edit",
        x-is-write: true,
        responses: { "200": { description: Live } },
      }
  /sales-campaigns/{id}/end:
    post:
      {
        summary: End a campaign early,
        tags: [sales_campaigns],
        parameters:
          [
            { $ref: "#/components/parameters/BrandContext" },
            {
              name: id,
              in: path,
              required: true,
              schema: { type: string, format: uuid },
            },
          ],
        x-required-permission: "sales_campaigns.edit",
        x-is-write: true,
        responses: { "200": { description: Ended } },
      }
  /sales-campaigns/{id}/duplicate:
    post:
      {
        summary: Clone a campaign into a new draft,
        tags: [sales_campaigns],
        parameters:
          [
            { $ref: "#/components/parameters/BrandContext" },
            {
              name: id,
              in: path,
              required: true,
              schema: { type: string, format: uuid },
            },
          ],
        x-required-permission: "sales_campaigns.create",
        x-is-write: true,
        responses: { "201": { description: New draft } },
      }

  /sales-campaigns/{id}/products:
    parameters:
      - $ref: "#/components/parameters/BrandContext"
      - {
          name: id,
